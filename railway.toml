# railway.toml — Railway deployment configuration
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Environment variables (set sensitive values in Railway dashboard) ─────────
# DATABASE_URL          → Railway PostgreSQL plugin (auto-injected)
# REDIS_URL             → Railway Redis plugin (auto-injected)
# QDRANT_URL            → Your Qdrant Cloud URL
# QDRANT_API_KEY        → Qdrant Cloud API key
# OPENAI_API_KEY        → OpenAI API key
# LANGCHAIN_API_KEY     → LangSmith API key
# LANGCHAIN_TRACING_V2  → true
# LANGCHAIN_PROJECT     → ipl-ai-platform
# INTENT_MODEL_PATH     → ml/models/intent_classifier.joblib
# WIN_PROB_MODEL_PATH   → ml/models/win_probability.joblib
# ENV                   → production
# LOG_LEVEL             → INFO
# CACHE_TTL_SECONDS     → 3600
